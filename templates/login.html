<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Predictive Maintenance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; text-align: center; padding: 1rem; cursor: pointer; color: var(--text-secondary); transition: all 0.3s; }
        .tab-btn.active { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; font-weight: 600; }
        .auth-view { display: none; }
        .auth-view.active { display: block; }
    </style>
</head>
<body class="login-page">
    <div class="background-animation">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="login-container glass-panel">
        <div class="logo justify-center">
            <div class="logo-icon"></div>
        </div>
        <h1 class="text-center">Manufacturing <span>Intelligence Center</span></h1>
        
        <div class="tabs">
            <div class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</div>
            <div class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</div>
        </div>
        
        <!-- Login Form -->
        <div id="view-login" class="auth-view active">
            <p class="text-center auth-subtitle" style="margin-top: -0.5rem">Please authenticate to continue</p>
            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="username">Operator ID</label>
                    <input type="text" id="username" name="username" placeholder="Enter your ID" required>
                </div>

                <div class="input-group">
                    <label for="password">Access Code</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <!-- Hint for testing -->
                <p style="font-size: 0.8rem; color: var(--text-secondary); text-align: center;">
                    Hint: admin / adminpassword
                </p>

                <div class="form-actions login-actions">
                    <button type="submit" class="analyze-btn full-width" id="login-btn">
                        <span class="btn-text">Authenticate Session</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Registration Form -->
        <div id="view-register" class="auth-view">
            <p class="text-center auth-subtitle" style="margin-top: -0.5rem">Create a new operator identity</p>
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="reg-username">New Operator ID</label>
                    <input type="text" id="reg-username" name="username" placeholder="Choose an ID" required>
                </div>

                <div class="input-group">
                    <label for="reg-password">Secure Access Code</label>
                    <input type="password" id="reg-password" name="password" placeholder="Choose a password" required>
                </div>

                <div class="form-actions login-actions">
                    <button type="submit" class="analyze-btn full-width" id="reg-btn">
                        <span class="btn-text">Register Identity</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`view-${tab}`).classList.add('active');
        }

        async function handleAuth(e, url, btnId) {
            e.preventDefault();
            const btn = document.getElementById(btnId);
            btn.classList.add('loading');
            
            const form = e.target;
            const data = {
                username: form.username.value,
                password: form.password.value
            };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    window.location.href = result.redirect;
                } else {
                    alert('Error: ' + result.message);
                    if (url === '/login') form.password.value = ''; // only clear pw on bad login
                }
            } catch (err) {
                console.error(err);
                alert('Connection Error!');
            } finally {
                btn.classList.remove('loading');
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => handleAuth(e, '/login', 'login-btn'));
        document.getElementById('register-form').addEventListener('submit', (e) => handleAuth(e, '/register', 'reg-btn'));
    </script>
</body>
</html>
