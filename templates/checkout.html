<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Premium | Manufacturing Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .checkout-container { max-width: 600px; margin: 4rem auto; }
        .benefit-list { list-style: none; margin: 1.5rem 0; text-align: left; }
        .benefit-list li { margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); }
        .benefit-list li::before { content: "✓"; color: #10b981; font-weight: bold; }
        .price-tag { font-size: 2.5rem; font-weight: 800; color: white; margin: 1rem 0; }
        .price-tag span { font-size: 1rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="container">
        <div class="checkout-container glass-panel text-center">
            <div class="logo justify-center">
                <div class="logo-icon"></div>
            </div>
            <h1>Unlock <span>Premium Intelligence</span></h1>
            <p class="auth-subtitle">AI-Powered Diagnostics & Unlimited Retraining</p>
            
            <div class="price-tag">$499<span>/month</span></div>

            <ul class="benefit-list">
                <li>Real-time failure probability analysis</li>
                <li>Isolation Forest Anomaly Detection</li>
                <li>Custom Machine Model Fine-tuning</li>
                <li>Unlimited NLP Querying</li>
                <li>24/7 Priority Support</li>
            </ul>

            <button class="analyze-btn full-width" id="procure-btn" onclick="handleCheckout()">
                <span class="btn-text">Proceed to Procurement</span>
            </button>
            <p style="margin-top: 1rem;"><a href="/" style="color: var(--text-secondary); font-size: 0.9rem;">Back to Dashboard</a></p>
        </div>
    </div>

    <script>
        async function handleCheckout() {
            const btn = document.getElementById('procure-btn');
            btn.classList.add('loading');
            
            try {
                const res = await fetch('/checkout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    alert('SUCCESS: ' + data.message);
                    window.location.href = '/';
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('Payment Gateway Connection Failed');
            } finally {
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
